services:
  postgres:
    image: postgres:16-alpine
    container_name: campus-health-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: campus_health
      POSTGRES_USER: campus_health
      POSTGRES_PASSWORD: campus_health
    ports:
      - "5432:5432"
    volumes:
      - campus_health_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus_health -d campus_health"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        MAVEN_IMAGE: maven:3.9.9-eclipse-temurin-17
        JRE_IMAGE: eclipse-temurin:17-jre
    container_name: campus-health-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/campus_health
      SPRING_DATASOURCE_USERNAME: campus_health
      SPRING_DATASOURCE_PASSWORD: campus_health
      CAMPUS_PLATFORM_OUTBOX_DISPATCH_INTERVAL_MS: 1000
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        NODE_IMAGE: node:22-alpine
        NGINX_IMAGE: nginx:1.27-alpine
    container_name: campus-health-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  campus_health_pgdata: