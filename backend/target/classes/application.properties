spring.application.name=campus-health-platform
server.port=8080
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

campus.security.admin-username=${ADMIN_USERNAME:admin}
campus.security.admin-password=${ADMIN_PASSWORD:root}
campus.security.token-expiration-ms=${TOKEN_EXPIRATION:86400000}
campus.security.max-login-attempts=5
campus.security.lockout-duration-minutes=30

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/campus_health;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=CampusHealthHikariPool

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

campus.platform.outbox.dispatch-interval-ms=1000

campus.llm.enabled=false
campus.llm.provider=openai-compatible
campus.llm.endpoint-url=
campus.llm.chat-path=/v1/chat/completions
campus.llm.api-key=
campus.llm.model=gpt-4o-mini
campus.llm.temperature=0.2
campus.llm.max-tokens=800
campus.llm.timeout-seconds=20
campus.llm.system-template=classpath:/prompts/campus-health-system.txt
campus.llm.user-template=classpath:/prompts/campus-health-user.txt
campus.llm.max-context-snippets=3

campus.rag.enabled=true
campus.rag.sources=classpath:/rag/campus-health-knowledge.md
campus.rag.max-results=3
campus.rag.max-chars-per-chunk=800

logging.level.root=INFO
logging.level.com.campushealth=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=OFF
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
